[build]
  command = "npm run build"
  publish = "out"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-ancestors 'self'"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pictures/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/dokument/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Serve sitemap and robots with correct content types
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Netlify processing
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true
[build.processing.xml]
  skip = true

# Environment variables
[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://stiftelseguiden.se"